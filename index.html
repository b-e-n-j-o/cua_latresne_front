<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Fond noir immédiat (évite le flash blanc avant React) -->
    <style>
      body {
        background: #000;
        margin: 0;
      }
    </style>

    <!-- Titre & description (affichés dans Google) — alignés avec la landing React -->
    <title>Kerelia — Bureau d'études en données géospatiales</title>
    <meta name="description" content="Kerelia transforme la donnée territoriale en levier opérationnel : urbanisme réglementaire (CUa), études environnementales, outils SIG sur mesure et pipelines géospatiaux. Bordeaux, Nouvelle-Aquitaine." />

    <!-- Canonical (évite les doublons vercel.app) -->
    <link rel="canonical" href="https://kerelia.fr/" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kerelia" />
    <meta property="og:title" content="Kerelia - Cabinet d'expertise géospatiale" />
    <meta property="og:description" content="Urbanisme réglementaire, études environnementales, SIG sur mesure et données territoriales — pour guider vos projets." />
    <meta property="og:url" content="https://kerelia.fr/" />
    <meta property="og:image" content="https://kerelia.fr/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Couleur d’UI mobile -->
    <meta name="theme-color" content="#85e372" />

    <!-- Favicon / icônes -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Données structurées JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Kerelia",
        "url": "https://kerelia.fr/",
        "description": "Kerelia — Donnée territoriale au service de vos projets - Nouvelle Aquitaine",
        "logo": "https://kerelia.fr/KERELIA-14.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "contact@kerelia.fr",
          "contactType": "customer support",
          "availableLanguage": ["fr"]
        },
        "areaServed": "FR",
        "sameAs": ["https://www.linkedin.com/company/kerelia/"]
      }
      </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
